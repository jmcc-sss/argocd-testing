apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: beacon-baseline
  namespace: argocd
spec:
  generators:
    - merge:
        mergeKeys:
          - name
        generators:
          - git:
              repoURL: git@github.com:jmcc-sss/argocd-testing.git
              revision: HEAD
              files:
                - path: beacon/*/*/baseline/config.yaml
          - git:
              repoURL: git@github.com:jmcc-sss/argocd-testing.git
              revision: HEAD
              files:
                - path: clusters/*.yaml
  template:
    metadata:
      name: '{{name}}-{{namespace}}-baseline'
    spec:
      project: dops
      source:
        repoURL: git@github.com:jmcc-sss/argocd-testing.git
        targetRevision: HEAD
        path: 'common/{{environment}}/{{namespace}}/baseline'
      destination:
        server: '{{clusterUrl}}'
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true