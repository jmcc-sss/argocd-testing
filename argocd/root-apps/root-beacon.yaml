apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-beacon
  namespace: argocd
spec:
  project: beacon
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: git@github.com:jmcc-sss/argocd-testing.git
    targetRevision: main
    path: argocd/beacon/
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
